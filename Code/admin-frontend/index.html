<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusPulse Admin + Student Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260424" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>

    <main class="app-shell" id="appShell">
      <section class="auth-card" id="authCard">
        <p class="eyebrow">ATTENDANCE GOVERNANCE PORTAL</p>
        <h1>CampusPulse</h1>
        <p class="auth-copy">Sign in with your official college credentials.</p>

        <form id="loginForm" class="auth-form" method="POST">
          <label class="field-label" for="role">Role</label>
          <select id="role" name="role" required>
            <option value="admin">Admin</option>
            <option value="student">Student</option>
          </select>

          <label class="field-label" for="email">College Email</label>
          <input id="email" name="email" type="email" placeholder="user@college.edu" autocomplete="email" required />

          <label class="field-label" for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />

          <button type="submit" class="btn-primary">Enter Portal</button>
        </form>
      </section>

      <section class="dashboard hidden" id="dashboard">
        <aside class="sidebar">
          <div>
            <p class="eyebrow">CURRENT ROLE</p>
            <h2 id="roleHeading">Admin Console</h2>
            <p id="userIdentity" class="muted"></p>
          </div>

          <nav id="roleNav" class="nav-list"></nav>

          <div class="sidebar-foot">
            <button class="btn-ghost" id="logoutBtn">Logout</button>
          </div>
        </aside>

        <section class="content">
          <header class="content-head">
            <div>
              <p class="eyebrow">COLLEGE OPERATIONS</p>
              <h3 id="pageTitle">Overview</h3>
            </div>
            <div class="content-actions">
              <span class="status-pill" id="syncPill">Sync Status</span>
            </div>
          </header>

          <div id="pageMount" class="page-mount"></div>
        </section>
      </section>
    </main>

    <template id="kpiCardTpl">
      <article class="kpi-card">
        <p class="kpi-label"></p>
        <h4 class="kpi-value"></h4>
        <p class="kpi-foot muted"></p>
      </article>
    </template>

    <div id="toast" class="toast hidden" aria-live="polite"></div>

    <script src="app.js?v=20260424"></script>
  </body>
</html>
